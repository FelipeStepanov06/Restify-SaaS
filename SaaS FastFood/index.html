<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="description" content="Restify — Totem de Autoatendimento">
  <title>Restify — Totem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 0. WELCOME / SPLASH -->
<div id="screen-splash" class="screen active">
  <div class="welcome-bg" id="welcome-bg"></div>
  <div class="welcome-overlay"></div>
  <div class="splash-content">
    <h1 class="splash-logo">RESTIFY</h1>
    <div class="splash-underline"></div>
    <p class="splash-tagline">Seu pedido, do seu jeito</p>
    <button class="btn-start" id="btn-start" style="margin-top: 60px; opacity: 0; animation: fadeUp .5s ease 1.5s forwards;">
      <span>Toque para iniciar</span>
      <div class="btn-ring"></div>
    </button>
  </div>
</div>

<!-- 2. DINE OPTION -->
<div id="screen-dine" class="screen">
  <div class="dine-title">Onde você vai comer?</div>
  <div class="dine-opts">
    <button class="dine-card" id="btn-eat-in"><div class="icon">🍽️</div><h3>Comer Aqui</h3><p>Servimos na sua mesa</p></button>
    <button class="dine-card" id="btn-take-away"><div class="icon">🛍️</div><h3>Para Levar</h3><p>Embalamos para viagem</p></button>
  </div>
</div>

<!-- 3. MENU -->
<div id="screen-menu" class="screen">
  <!-- Carousel -->
  <div class="carousel-wrap">
    <div class="carousel-track" id="carousel-track"></div>
  </div>
  <div class="carousel-dots" id="carousel-dots"></div>
  <!-- Main -->
  <div class="menu-main">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="menu-grid-area">
      <div class="products-grid" id="products-grid"></div>
    </main>
  </div>
  <!-- Add bar -->
  <div class="add-bar"><button id="btn-add-bar" disabled>Adicionar ao Carrinho</button></div>
  <!-- Bottom nav -->
  <div class="bottom-nav">
    <button class="nav-btn nav-cart" id="nav-cart-menu">🛒 Carrinho</button>
    <button class="nav-btn nav-back" id="nav-back-menu">‹ Voltar</button>
    <button class="nav-btn nav-continue" id="nav-cont-menu">Continuar ›</button>
  </div>
</div>

<!-- 4. CUSTOMIZATION -->
<div id="screen-custom" class="screen">
  <div class="carousel-wrap">
    <div class="carousel-track" id="carousel-track-2"></div>
  </div>
  <div class="carousel-dots" id="carousel-dots-2"></div>
  <div class="custom-body">
    <div class="custom-left">
      <img class="custom-img" id="custom-img" src="" alt="">
      <div class="custom-name" id="custom-name"></div>
      <div class="custom-price" id="custom-price"></div>
      <div class="ingredients-section" id="ingredients-section"></div>
    </div>
    <div class="custom-right" id="custom-right"></div>
  </div>
  <div class="add-bar"><button id="btn-add-custom">Adicionar ao Carrinho</button></div>
  <div class="bottom-nav">
    <button class="nav-btn nav-cart" id="nav-cart-custom">🛒 Carrinho</button>
    <button class="nav-btn nav-back" id="nav-back-custom">‹ Voltar</button>
    <button class="nav-btn nav-continue" id="nav-cont-custom">Continuar ›</button>
  </div>
</div>

<!-- 5. CART -->
<div id="screen-cart" class="screen">
  <div class="carousel-wrap">
    <div class="carousel-track" id="carousel-track-3"></div>
  </div>
  <div class="carousel-dots" id="carousel-dots-3"></div>
  <div class="cart-title-bar">🛒 Carrinho</div>
  <div class="cart-list" id="cart-list"></div>
  <div class="bottom-nav">
    <button class="nav-btn nav-back" id="nav-back-cart">‹ Voltar</button>
    <button class="nav-btn nav-continue" id="nav-cont-cart" disabled>Continuar ›</button>
  </div>
</div>

<!-- 6. PAYMENT -->
<div id="screen-payment" class="screen">
  <div class="pay-header">
    <button class="nav-btn nav-back" id="nav-back-pay">‹ Voltar</button>
    <h2>Como deseja pagar?</h2>
  </div>
  <div class="pay-methods" id="pay-methods">
    <button class="pay-card" id="pay-card"><div class="icon">💳</div><h3>Cartão</h3><p>Crédito ou Débito</p></button>
    <button class="pay-card" id="pay-pix"><div class="icon">📱</div><h3>PIX</h3><p>Instantâneo</p></button>
    <button class="pay-card" id="pay-cash"><div class="icon">💵</div><h3>Dinheiro</h3><p>Pague no caixa</p></button>
  </div>
  <div class="pay-processing" id="pay-processing">
    <div class="spinner"></div>
    <h3 id="proc-text">Processando...</h3>
    <p id="proc-sub">Aguarde</p>
  </div>
</div>

<!-- 7. CONFIRMATION -->
<div id="screen-confirm" class="screen">
  <div class="confirm-box">
    <svg class="check-svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" class="check-circle"/><path d="M30 50 L45 65 L70 35" class="check-mark"/></svg>
    <h2>Pedido Confirmado!</h2>
    <p>Sua senha é</p>
    <div class="order-num" id="order-num">#001</div>
    <p class="sub">Acompanhe no painel</p>
    <p class="timer">Voltando em <span id="countdown">8</span>s</p>
  </div>
</div>

<!-- Accessibility toggle -->
<button class="a11y-btn" id="btn-a11y" title="Acessibilidade">♿</button>

<script src="app.js"></script>
</body>
</html>
