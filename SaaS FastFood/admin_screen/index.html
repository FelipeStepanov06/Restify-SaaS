<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Restify — Administração</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <h1>RESTIFY</h1>
      <span>Admin</span>
    </div>
    <nav class="nav-menu">
      <button class="nav-link active" data-target="dashboard">
        <span class="icon">📊</span> Dashboard
      </button>
      <button class="nav-link" data-target="products">
        <span class="icon">🍔</span> Produtos
      </button>
      <!-- Return to totem button -->
      <a href="../index.html" class="nav-link btn-return">
        <span class="icon">📱</span> Ver Totem
      </a>
    </nav>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    
    <!-- DASHBOARD VIEW -->
    <section id="view-dashboard" class="view active">
      <div class="header-bar">
        <h2>Dashboard de Vendas</h2>
        <button id="btn-export-csv" class="btn btn-primary">
          <span class="icon">📥</span> Exportar CSV
        </button>
      </div>

      <div class="metrics-grid">
        <div class="metric-card">
          <h3>Receita Total</h3>
          <div class="value" id="metric-revenue">R$ 0,00</div>
        </div>
        <div class="metric-card">
          <h3>Pedidos Concluídos</h3>
          <div class="value" id="metric-orders">0</div>
        </div>
        <div class="metric-card">
          <h3>Produto Mais Vendido</h3>
          <div class="value" id="metric-top-product">-</div>
        </div>
      </div>

      <div class="recent-orders-card">
        <h3>Últimos Pedidos</h3>
        <div class="table-responsive">
          <table class="table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Data</th>
                <th>Itens</th>
                <th>Tipo</th>
                <th>Total</th>
              </tr>
            </thead>
            <tbody id="orders-table-body">
              <!-- Orders injected here -->
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- PRODUCTS VIEW -->
    <section id="view-products" class="view">
      <div class="header-bar">
        <h2>Gerenciar Produtos</h2>
        <button id="btn-new-product" class="btn btn-primary">
          <span class="icon">➕</span> Novo Produto
        </button>
      </div>

      <div class="products-admin-grid" id="products-admin-grid">
        <!-- Products injected here -->
      </div>
    </section>

  </main>

  <!-- MODAL: ADD/EDIT PRODUCT -->
  <div class="modal-overlay" id="product-modal">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modal-title">Novo Produto</h3>
        <button class="btn-close" id="btn-close-modal">✕</button>
      </div>
      <div class="modal-body">
        <form id="product-form">
          <input type="hidden" id="prod-id">
          
          <div class="form-group">
            <label for="prod-name">Nome do Produto</label>
            <input type="text" id="prod-name" required placeholder="Ex: X-Bacon Supremo">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="prod-price">Preço (R$)</label>
              <input type="number" step="0.01" id="prod-price" required placeholder="0.00">
            </div>
            <div class="form-group">
              <label for="prod-cat">Categoria</label>
              <select id="prod-cat" required>
                <option value="comida">Comida (Lanches)</option>
                <option value="promos">Promoção</option>
                <option value="acomp">Acompanhamento</option>
                <option value="bebidas">Bebidas</option>
                <option value="sobremesas">Sobremesas</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="prod-img">URL da Imagem</label>
            <input type="url" id="prod-img" required placeholder="https://exemplo.com/imagem.jpg">
            <small>Dica: Use imagens do Unsplash ou de um CDN.</small>
          </div>
          
          <div class="image-preview" id="image-preview">
            <span>Pré-visualização</span>
          </div>

        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="btn-cancel-modal">Cancelar</button>
        <button class="btn btn-primary" id="btn-save-product" form="product-form">Salvar Produto</button>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
